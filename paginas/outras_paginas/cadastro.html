<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto WEB - HTML/CSS</title>

    <link rel="stylesheet" href="../../css/style_formulario.css">
</head>

<body>

    <div id="links">
        <a href="../index.html">Página inicial</a> | <a href="/paginas/texto.html">Texto</a> | <a
            href="/paginas/outras_paginas/outro_texto.html"></a> | <a href="/paginas/cadastro.html">Cadastro</a> | <a
            href="/paginas/listas.html">Lista</a> | <a href="/paginas/tabela.html">Tabela</a> | <a
            href="/paginas/imagens.html">Imagens</a>
    </div>

    <div id="div-form">
        <h3>Formulário HTML</h3>

        <form name="form-pessoa" id="form-pessoa" method="post">

            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input-txt01" maxlength="5" required placeholder="Informe seu nome">

            <label for="cpf">CPF</label>
            <input type="text" name="cpf" id="cpf" class="input-txt02" maxlenght="14" required placeholder="Informe o CPF">

            <label for="sexo">Sexo</label>
            <input type="radio" name="sexo" id="sxF" class="input-radio" required value="F"> Feminino
            <input type="radio" name="sexo" id="sxM" class="input-radio" required value="M"> Masculino
            <input type="radio" name="sexo" id="sxND" class="input-radio" required value="N" checked> Não declarar

            <label for="estado">Estado</label>
            <select name="estado" id="estado">
                <option>Selecione o Estado</option>
                <option value="Al">Alagoas</option>
                <option value="Ba">Bahia</option>
                <option value="Pe">Pernambuco</option>
                <option value="Pb">Paraíba</option>
                <option value="Rn">Rio Grande do Norte</option>
                <option value="Ce">Ceará</option>
                <option value="Pi">Piauí</option>
                <option value="Ma">Maranhão</option>
                <option value="Se" selected>Sergipe</option>
            </select>

                <label for="preferencias">Preferências</label>
                <input type="checkbox" name="estudo" id="estudo" value="estudo">Estudo
                <input type="checkbox" name="viagem" id="viagem" value="viagem">Viagem
                <input type="checkbox" name="trabalho" id="trabalho" value="trabalho">Trabalho
                <input type="checkbox" name="compras" id="compras" value="compras">Compras

                <label for="comentario">Comentário</label>
                <textarea name="comentario" id="comentario"></textarea>

                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" class="input-txt02" required placeholder="Informe uma senha" maxlenght="6">

                <label for="datanascimento">Data Nascimento</label>
                <input type="date" name="datanascimento" id="datanascimento" class="input-txt02" required>

                <label for="quantidade">Quantidade</label>
                <input type="range" name="quantidade" id="quantidade" class="input-txt02" min="0" max="10" value="6">

                <button type="submit" id="btn-Enviar">Enviar</button>
                <button type="reset" id="btn-limpar" class="btn">Limpar</button>
                <button id="btn" class="btn">Botão</button>

        </form>



    </div>
</body>

</html>
